<div class="overlay">

  <div class="task-container">
    <h1>משימת טופס</h1>
    <h2>עיריית תל אביב</h2>

    <div class="form-group">
      <input type="email" [formControl]="emailControl" placeholder="הכנס כתובת אימייל" class="email-input"
        autocomplete="email" />
    </div>

    <div class="action-group">
      <button (click)="onSubmit()" [disabled]="emailControl.invalid || isLoading" class="submit-btn">
        {{ isLoading ? 'שולח...' : 'שלח לשרת' }}
      </button>
    </div>

    <div *ngIf="errorMessage" class="message error-message">
      {{ errorMessage }}
    </div>

    <div *ngIf="lastResponseTime" class="message success-message">
      הבקשה התקבלה בשרת בשעה: <strong>{{ lastResponseTime | date:'HH:mm:ss' }}</strong>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 פותח על ידי DorZevron</p>
  </footer>
</div>
